title: Scheduled Task with Suspicious Action Path
id: 92a3c4b5-1a2b-3c4d-5e6f-7a8b9c0d1e2f
status: experimental
description: >
  Detects scheduled tasks whose action binary executes from a user-writable
  or non-standard directory, which is a common indicator of persistence or
  lateral movement via scheduled tasks (T1053.005).
references:
  - https://attack.mitre.org/techniques/T1053/005/
  - https://github.com/SigmaHQ/sigma/blob/master/rules/windows/process_creation/proc_creation_win_schtasks_creation.yml
author: William Richardson
date: 2024/01/15
modified: 2024/06/01
tags:
  - attack.persistence
  - attack.execution
  - attack.t1053.005
logsource:
  category: process_creation
  product: windows
detection:
  selection_suspicious_location:
    Image|contains:
      - '\AppData\'
      - '\Temp\'
      - '\Users\Public\'
      - '\ProgramData\'
      - '\Desktop\'
      - '\Downloads\'
  filter_known_updaters:
    Image|contains:
      - '\AppData\Local\Microsoft\Teams\'
      - '\AppData\Local\Google\Chrome\Application\'
  condition: selection_suspicious_location and not filter_known_updaters
falsepositives:
  - Software update agents that install to user profile directories
  - Development tools running from non-standard paths
level: high
