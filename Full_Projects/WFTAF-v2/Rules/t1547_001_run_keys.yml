title: Boot or Logon Autostart Execution via Registry Run Keys
id: 17f878b8-9968-4578-b814-c4217fc5768c
status: stable
description: >
  Detects entries in standard autostart registry locations that may represent
  persistence via Run Keys (T1547.001). Filters out values pointing to known-good
  system paths to reduce false positives.
references:
  - https://attack.mitre.org/techniques/T1547/001/
  - https://github.com/SigmaHQ/sigma/blob/master/rules/windows/registry/registry_set/registry_set_asep_reg_keys_modification_common.yml
author: William Richardson
date: 2024/01/15
modified: 2024/06/01
tags:
  - attack.persistence
  - attack.t1547.001
logsource:
  category: registry_event
  product: windows
detection:
  selection:
    TargetObject|contains:
      - '\SOFTWARE\Microsoft\Windows\CurrentVersion\Run'
      - '\SOFTWARE\Microsoft\Windows\CurrentVersion\RunOnce'
      - '\SOFTWARE\WOW6432Node\Microsoft\Windows\CurrentVersion\Run'
      - '\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon'
  filter_system_paths:
    Details|startswith:
      - 'C:\Windows\System32\'
      - 'C:\Windows\SysWOW64\'
      - 'C:\Program Files\Windows Defender\'
      - 'C:\Program Files\Microsoft Security Client\'
  condition: selection and not filter_system_paths
falsepositives:
  - Legitimate software registering autostart entries during installation
  - Antivirus and endpoint protection products
level: medium
